<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>In goede orde ontvangen — Alana's Hair Boutique</title>
    <link class="js-favicon" rel="icon" href="/images/favicon-alana.png" />
    <link rel="stylesheet" href="/src/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Pinyon+Script&family=Quicksand:wght@300..700&display=swap">
    <script type="module" src="/src/js/index.js"></script>
</head>
<body class="bg-brand-cream h-screen w-screen flex flex-col justify-between selection:bg-brand-bronze/10 overflow-hidden relative">

    <!-- Subtiele omranding voor een high-end 'editorial' gevoel -->
    <div class="fixed inset-4 pointer-events-none border border-brand-bronze/10 z-50"></div>

    <!-- MAIN EXPERIENCE: Perfect gecentreerd op screen height -->
    <main class="flex-grow flex items-center justify-center px-6 relative z-10 h-full">
        <div class="max-w-3xl mx-auto text-center flex flex-col items-center justify-center space-y-8 md:space-y-12">
            
            <!-- HET LOGO: Prachtig opgeschaald en scherp op elk scherm -->
            <div class="select-none animate-fade-in tracking-[0.2em]">
                <img src="/images/logo-alana.png" alt="Alana's Hair Boutique" class="h-28 sm:h-36 md:h-48 lg:h-56 min-[2000px]:h-80 w-auto mx-auto opacity-90 object-contain" />
            </div>

            <!-- Subtiele scheidingslijn -->
            <div class="w-16 min-[2000px]:w-32 h-[1px] bg-brand-bronze/30 mx-auto"></div>

            <!-- De Boodschap: Elegant, ruim opgezet en poëtisch -->
            <div class="space-y-4 max-w-lg min-[2000px]:max-w-3xl mx-auto">
                <h2 class="font-serif italic text-3xl sm:text-4xl md:text-5xl min-[2000px]:text-7xl text-brand-bronze font-normal leading-tight">
                    Succesvol ontvangen
                </h2>
                <p class="text-xs sm:text-sm min-[2000px]:text-2xl font-light text-brand-dark/70 tracking-widest uppercase leading-relaxed pt-2">
                    Hartelijk dank voor uw bericht.<br class="hidden sm:inline" />
                    Ik neem de tijd om uw vraag zorgvuldig te bekijken<br class="hidden sm:inline" />
                    en antwoord u zo spoedig mogelijk.
                </p>
            </div>

            <!-- Luxe Knop terug naar Home: Perfect responsive -->
            <div class="pt-4 md:pt-6">
                <a href="/" class="custom-fill-btn relative px-10 py-3.5 max-[1500px]:px-8 max-[1500px]:py-3 xl:px-12 xl:py-4 min-[2000px]:px-28 min-[2000px]:py-8 text-xs md:text-sm min-[2000px]:text-2xl font-bold uppercase tracking-[0.25em] border-2 min-[2000px]:border-4 border-brand-bronze/50 text-brand-bronze no-underline inline-block overflow-hidden transition-all duration-300 hover:border-brand-bronze">
                    <span class="btn-bg"></span>
                    <span class="btn-text">Terug naar home</span>
                </a>
            </div>

        </div>
    </main>

    <!-- MINIMALISTISCHE FOOTER: Altijd strak onderaan verankerd -->
    <footer class="w-full text-center py-6 md:py-8 relative z-10 bg-transparent">
        <p class="text-[9px] min-[2000px]:text-base text-brand-dark/30 tracking-[0.3em] uppercase m-0">
            &copy; 2026 Alana's Hair Boutique — All rights reserved
        </p>
    </footer>

</body>
</html>
